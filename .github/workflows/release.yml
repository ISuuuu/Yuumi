name: Release Yuumi

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '手动指定版本号 (例如: v0.1.0)'
        required: true
        type: string

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `Yuumi ${tagName}`,
              body: '## What\'s Changed\n\n请查看下方 Changelog',
              tag_name: tagName,
              draft: true,
              prerelease: false
            });
            return data.id

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install NSIS (required for Tauri Windows bundler)
        shell: pwsh
        run: |
          choco install nsis -y
          # 确保 makensis 在 PATH 中
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) {
            echo "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Added NSIS to PATH: $nsisPath"
          }

      - name: Install frontend dependencies
        run: pnpm install

      - name: Update version in tauri.conf.json
        shell: pwsh
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}" -replace '^v', ''
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $config.version = $VERSION
          $config | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.version }}"
          git fetch --tags --quiet
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --format="- %s" -20)
          else
            NOTES=$(git log --format="- %s" "${PREV_TAG}..${TAG}")
          fi
          # 写入多行 output
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri (Windows)
        run: pnpm tauri build

      - name: Generate latest.json for updater
        shell: pwsh
        run: >
          Write-Host "=== Bundle directory contents ===";
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Bundle directory does not exist!"; exit 1
          };
          $VERSION = "${{ needs.create-release.outputs.version }}" -replace '^v', '';
          $TAG = "${{ needs.create-release.outputs.version }}";
          $EXE_FILE = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1;
          if (-not $EXE_FILE) { Write-Error "No .exe found in bundle/nsis/"; exit 1 };
          $SIG_FILE = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe.sig" | Select-Object -First 1;
          if (-not $SIG_FILE) {
            Write-Host "No .sig found, generating...";
            npx --yes tauri signer sign $EXE_FILE.FullName --private-key "${{ env.TAURI_SIGNING_PRIVATE_KEY }}" --password "${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}";
            $SIG_FILE = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe.sig" | Select-Object -First 1
          };
          if (-not $SIG_FILE) { Write-Error "Failed to generate .sig file"; exit 1 };
          $SIGNATURE = Get-Content $SIG_FILE.FullName -Raw;
          $PUB_DATE = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ");
          $CHANGELOG = "${{ steps.changelog.outputs.notes }}".Trim();
          $LATEST_JSON = @{ version=$VERSION; notes=$CHANGELOG; pub_date=$PUB_DATE; platforms=@{ "windows-x86_64"=@{ signature=$SIGNATURE.Trim(); url="https://github.com/ISuuuu/Yuumi/releases/download/${TAG}/$($EXE_FILE.Name)" } } };
          $LATEST_JSON | ConvertTo-Json -Depth 10 | Set-Content "latest.json" -Encoding UTF8;
          Write-Host "Generated latest.json";
          Get-Content "latest.json" | Write-Host

      - name: Pack portable zip
        shell: pwsh
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}" -replace '^v', ''
          $PORTABLE_DIR = "Yuumi_portable"
          $ZIP_NAME = "Yuumi_v${VERSION}_portable.zip"

          # 创建便携版目录，复制 exe 和 resources
          New-Item -ItemType Directory -Force -Path $PORTABLE_DIR
          Copy-Item "src-tauri/target/release/yuumi.exe" "$PORTABLE_DIR/"
          if (Test-Path "src-tauri/target/release/resources") {
            Copy-Item "src-tauri/target/release/resources" "$PORTABLE_DIR/" -Recurse
          }

          # 打包成 zip
          Compress-Archive -Path "$PORTABLE_DIR/*" -DestinationPath $ZIP_NAME -Force
          Write-Host "Portable zip created: $ZIP_NAME"

      - name: Verify NSIS bundle exists
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Error "NSIS bundle directory not found at $nsisDir"
            # 列出 bundle 目录下有什么
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yuumi-windows-installer
          path: ./src-tauri/target/release/bundle/nsis/*.exe, ./src-tauri/target/release/bundle/nsis/*.exe.sig
          retention-days: 7
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuumi-windows-portable
          path: ./Yuumi_v*_portable.zip
          retention-days: 7

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: yuumi-updater
          path: ./latest.json
          retention-days: 7

  publish-release:
    needs: [create-release, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changelog
        id: changelog
        run: |
          TAG_NAME="${{ needs.create-release.outputs.version }}"
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --format="- %s" -20)
          else
            CHANGELOG=$(git log --oneline --format="- %s" "${PREV_TAG}..${TAG_NAME}")
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in this release" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Windows installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: yuumi-windows-installer
          path: ./artifacts/installer

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v4
        with:
          name: yuumi-windows-portable
          path: ./artifacts/portable

      - name: Download updater artifact (latest.json)
        uses: actions/download-artifact@v4
        with:
          name: yuumi-updater
          path: ./artifacts/updater

      - name: List artifacts
        run: ls -la ./artifacts/installer ./artifacts/portable ./artifacts/updater

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          releaseId: ${{ needs.create-release.outputs.release_id }}
          body: "${{ steps.changelog.outputs.notes }}"
          artifacts: "./artifacts/installer/*,./artifacts/portable/*,./artifacts/updater/latest.json"
